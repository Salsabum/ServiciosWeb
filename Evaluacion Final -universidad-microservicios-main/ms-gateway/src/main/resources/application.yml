server:
  port: 8080

spring:
  application:
    name: ms-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9090/realms/universidad/protocol/openid-connect/certs

  cloud:
    gateway:
      routes:
        - id: ms-cursos
          uri: http://localhost:8081
          predicates:
            - Path=/api/courses/**

        - id: ms-profesores
          uri: http://localhost:8082
          predicates:
            - Path=/api/teachers/**

        - id: ms-horarios
          uri: http://localhost:8083
          predicates:
            - Path=/api/schedules/**